<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@16.12.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@16.12.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.8.3/babel.js"></script>
  <style>
    .tilt-root {
      width: 100px;
      height: 100px;
      border: 1px solid blue;
      background-color: blanchedalmond;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .tilt-child {
      width: 50px;
      height: 50px;
      border: 1px solid red;
      background-color: white;
    }
  </style>
  <script type="text/babel">
    function Child() {
      console.log('%c   Child: render start', 'color: Green');

      const [count, setCount] = React.useState(() => {
        console.log('%c   Child: useState callback', 'color: tomato');
        return 0;
      });

      React.useEffect(() => {
        console.log('%c  Child: useEffect no deps', 'color: LightPink');
        return () => {
          console.log('%c  Child: useEffect no deps cleanup', 'color: LightCoral');
        };
      });

      React.useEffect(() => {
        console.log('%c  Child: useEffect empty deps', 'color: MediumTurquoise');
        return () => {
          console.log('%c  Child: useEffect empty deps cleanup', 'color: LightCoral');
        };
      }, []);

      React.useEffect(() => {
        console.log('%c Child: useEffect with dep', 'color: Orange');
        return () => {
          console.log('%c  Child: useEffect with dep cleanup', 'color: LightCoral');
        };
      }, [count]);

      const element = (
        <button onClick={() => setCount(previousCount => previousCount + 1)}>
          {count}
        </button>
      );
      return element;
    }

    function App() {
      console.log('%cApp: render start', 'color: MediumSpringGreen');

      const [showChild, setShowChild] = React.useState(() => {
        console.log('%cApp: useState callback', 'color: tomato');
        return false;
      });

      React.useEffect(() => {
        console.log('%cApp: useEffect no deps', 'color: LightCoral');

        return () => {
          console.log('%cApp: useEffect no deps cleanup', 'color: LightCoral');
        };
      });

      React.useEffect(() => {
        console.log('%cApp: useEffect empty deps', 'color: MediumTurquoise');

        return () => {
          console.log('%cApp: useEffect empty deps cleanup', 'color: MediumTurquoise');
        };
      }, []);

      React.useEffect(() => {
        console.log('%cApp: useEffect with dep', 'color: HotPink');

        return () => {
          console.log('%cApp: useEffect with dep cleanup', 'color: HotPink');
        };
      }, [showChild]);

      const element = (
        <>
          <label>
            <input
              type='checkbox'
              checked={showChild}
              onChange={e => {
                setShowChild(e.target.checked);
              }}
            />{' '}
            show child
          </label>
          <div
            style={{
              padding: 10,
              margin: 10,
              height: 30,
              width: 30,
              border: 'solid',
            }}
          >
            {showChild ? <Child /> : null}
          </div>
        </>
      );

      console.log('%cApp: render end', 'color: MediumSpringGreen');

      return element;
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
